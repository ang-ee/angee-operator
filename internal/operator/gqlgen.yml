schema:
  - schema.graphql

exec:
  package: gql
  layout: single-file
  filename: gql/generated.go

model:
  filename: gql/model/models_gen.go
  package: model

resolver:
  package: gql
  layout: follow-schema
  dir: gql
  filename_template: "{name}.resolvers.go"

skip_mod_tidy: true

models:
  JSON:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
  ServiceState:
    model:
      - github.com/ang-ee/angee-operator/api.ServiceState
    fields:
      id:
        resolver: true
  JobState:
    model:
      - github.com/ang-ee/angee-operator/api.JobState
    fields:
      id:
        resolver: true
  SourceState:
    model:
      - github.com/ang-ee/angee-operator/api.SourceState
    fields:
      id:
        resolver: true
  WorkspaceSourceStatus:
    model:
      - github.com/ang-ee/angee-operator/api.WorkspaceSourceStatus
  WorkspaceMountRef:
    model:
      - github.com/ang-ee/angee-operator/api.WorkspaceMountRef
  GitOpsLink:
    model:
      - github.com/ang-ee/angee-operator/api.GitOpsLink
  GitOpsSummary:
    model:
      - github.com/ang-ee/angee-operator/api.GitOpsSummary
  GitOpsTopology:
    model:
      - github.com/ang-ee/angee-operator/api.GitOpsTopologyResponse
  WorkspaceRef:
    model:
      - github.com/ang-ee/angee-operator/api.WorkspaceRef
    fields:
      id:
        resolver: true
      ttlExpiresAt:
        resolver: true
  WorkspaceStatus:
    model:
      - github.com/ang-ee/angee-operator/api.WorkspaceStatusResponse
    fields:
      id:
        resolver: true
      inputs:
        resolver: true
      allocations:
        resolver: true
      persistPaths:
        resolver: true
      ttlExpiresAt:
        resolver: true
  StackStatus:
    model:
      - github.com/ang-ee/angee-operator/api.StackStatusResponse
    fields:
      services:
        resolver: true
      jobs:
        resolver: true
      workspaces:
        resolver: true
  CompiledStack:
    model:
      - github.com/ang-ee/angee-operator/internal/service.CompiledStack
    fields:
      compose:
        resolver: true
      processCompose:
        resolver: true
      secretEnvVars:
        resolver: true
  WorkspaceCreatePreflight:
    model:
      - github.com/ang-ee/angee-operator/api.WorkspaceCreatePreflightResponse
    fields:
      effectiveInputs:
        resolver: true
  PreflightFailure:
    model:
      - github.com/ang-ee/angee-operator/api.PreflightFailure
  TemplateDescriptor:
    model:
      - github.com/ang-ee/angee-operator/api.TemplateDescriptor
    fields:
      id:
        resolver: true
  TemplateInputDescriptor:
    model:
      - github.com/ang-ee/angee-operator/api.TemplateInputDescriptor
  ConnectionToken:
    model:
      - github.com/ang-ee/angee-operator/api.ConnectionTokenResponse
  ServiceEndpoint:
    model:
      - github.com/ang-ee/angee-operator/api.ServiceEndpoint
  IngressStatus:
    model:
      - github.com/ang-ee/angee-operator/api.IngressStatus
  RouteRef:
    model:
      - github.com/ang-ee/angee-operator/api.RouteRef
  CommitRef:
    model:
      - github.com/ang-ee/angee-operator/api.CommitRef
  DiffFile:
    model:
      - github.com/ang-ee/angee-operator/api.DiffFile
  DiffHunk:
    model:
      - github.com/ang-ee/angee-operator/api.DiffHunk
  GitOpResult:
    model:
      - github.com/ang-ee/angee-operator/api.GitOpResult
  SecretRef:
    model:
      - github.com/ang-ee/angee-operator/api.SecretRef
    fields:
      id:
        resolver: true
  SecretValue:
    model:
      - github.com/ang-ee/angee-operator/api.SecretValueResponse
  FileContent:
    model:
      - github.com/ang-ee/angee-operator/api.FileContent
  FileRef:
    model:
      - github.com/ang-ee/angee-operator/api.FileRef
