schema:
  - schema.graphql

exec:
  package: gql
  layout: single-file
  filename: gql/generated.go

model:
  filename: gql/model/models_gen.go
  package: model

resolver:
  package: gql
  layout: follow-schema
  dir: gql
  filename_template: "{name}.resolvers.go"

skip_mod_tidy: true

models:
  JSON:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
  ServiceState:
    model:
      - github.com/fyltr/angee/api.ServiceState
  JobState:
    model:
      - github.com/fyltr/angee/api.JobState
  SourceState:
    model:
      - github.com/fyltr/angee/api.SourceState
  WorkspaceSourceStatus:
    model:
      - github.com/fyltr/angee/api.WorkspaceSourceStatus
  WorkspaceMountRef:
    model:
      - github.com/fyltr/angee/api.WorkspaceMountRef
  GitOpsLink:
    model:
      - github.com/fyltr/angee/api.GitOpsLink
  GitOpsSummary:
    model:
      - github.com/fyltr/angee/api.GitOpsSummary
  GitOpsTopology:
    model:
      - github.com/fyltr/angee/api.GitOpsTopologyResponse
  WorkspaceRef:
    model:
      - github.com/fyltr/angee/api.WorkspaceRef
    fields:
      ttlExpiresAt:
        resolver: true
  WorkspaceStatus:
    model:
      - github.com/fyltr/angee/api.WorkspaceStatusResponse
    fields:
      inputs:
        resolver: true
      allocations:
        resolver: true
      persistPaths:
        resolver: true
      ttlExpiresAt:
        resolver: true
  StackStatus:
    model:
      - github.com/fyltr/angee/api.StackStatusResponse
    fields:
      services:
        resolver: true
      jobs:
        resolver: true
      workspaces:
        resolver: true
  CompiledStack:
    model:
      - github.com/fyltr/angee/internal/service.CompiledStack
    fields:
      compose:
        resolver: true
      processCompose:
        resolver: true
      secretEnvVars:
        resolver: true
  WorkspaceCreatePreflight:
    model:
      - github.com/fyltr/angee/api.WorkspaceCreatePreflightResponse
    fields:
      effectiveInputs:
        resolver: true
  PreflightFailure:
    model:
      - github.com/fyltr/angee/api.PreflightFailure
  TemplateDescriptor:
    model:
      - github.com/fyltr/angee/api.TemplateDescriptor
  TemplateInputDescriptor:
    model:
      - github.com/fyltr/angee/api.TemplateInputDescriptor
  ConnectionToken:
    model:
      - github.com/fyltr/angee/api.ConnectionTokenResponse
  ServiceEndpoint:
    model:
      - github.com/fyltr/angee/api.ServiceEndpoint
  IngressStatus:
    model:
      - github.com/fyltr/angee/api.IngressStatus
  RouteRef:
    model:
      - github.com/fyltr/angee/api.RouteRef
  CommitRef:
    model:
      - github.com/fyltr/angee/api.CommitRef
  DiffFile:
    model:
      - github.com/fyltr/angee/api.DiffFile
  DiffHunk:
    model:
      - github.com/fyltr/angee/api.DiffHunk
  GitOpResult:
    model:
      - github.com/fyltr/angee/api.GitOpResult
  SecretRef:
    model:
      - github.com/fyltr/angee/api.SecretRef
  SecretValue:
    model:
      - github.com/fyltr/angee/api.SecretValueResponse
