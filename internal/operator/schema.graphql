}

type WorkspaceStatus {
  id: ID!
  name: String!
  path: String!
  exists: Boolean!
  state: String!
  error: String
  template: String!
  inputs: JSON
  sources: [WorkspaceSourceStatus!]!
  chain: [String!]!
