scalar JSON

type KeyValue {
  key: String!
  value: String!
}

# --- Hasura shared query primitives -------------------------------------------

enum order_by {
  asc
  asc_nulls_first
  asc_nulls_last
  desc
  desc_nulls_first
  desc_nulls_last
}

input String_comparison_exp {
  _eq: String
  _neq: String
  _gt: String
  _gte: String
  _lt: String
  _lte: String
  _in: [String!]
  _nin: [String!]
  _like: String
  _nlike: String
  _ilike: String
  _nilike: String
  _similar: String
  _is_null: Boolean
}

input Boolean_comparison_exp {
  _eq: Boolean
  _neq: Boolean
  _in: [Boolean!]
  _nin: [Boolean!]
  _is_null: Boolean
}

input Int_comparison_exp {
  _eq: Int
  _neq: Int
  _gt: Int
  _gte: Int
  _lt: Int
  _lte: Int
  _in: [Int!]
  _nin: [Int!]
  _is_null: Boolean
}

# --- entity (row) types -------------------------------------------------------

type ServiceState {
  id: ID!
