scalar JSON

type KeyValue {
  key: String!
  value: String!
}

# --- nestjs-query shared query primitives -------------------------------------

enum SortDirection {
  ASC
  DESC
}

enum SortNulls {
  NULLS_FIRST
  NULLS_LAST
}

input OffsetPaging {
  limit: Int
  offset: Int
}

type OffsetPageInfo {
  hasNextPage: Boolean
  hasPreviousPage: Boolean
}

input StringFieldComparison {
  is: Boolean
  isNot: Boolean
  eq: String
  neq: String
  gt: String
  gte: String
  lt: String
  lte: String
  like: String
  notLike: String
  iLike: String
  notILike: String
  in: [String!]
  notIn: [String!]
}

input BooleanFieldComparison {
  is: Boolean
  isNot: Boolean
}

# --- entity types -------------------------------------------------------------

type ServiceState {
  id: ID!
  name: String!
  runtime: String!
  status: String!
  health: String
}

type JobState {
  id: ID!
  name: String!
  runtime: String!
}

type WorkspaceRef {
  id: ID!
  name: String!
  path: String!
  template: String!
  processComposePort: Int
  playwrightMcpName: String
  playwrightMcpUrl: String
  ttl: String
  ttlExpiresAt: String
}

type SourceState {
  id: ID!
  name: String!
  slot: String
  kind: String!
  path: String!
  exists: Boolean!
  state: String
  branch: String
  ref: String
  currentRef: String
  dirty: Boolean
  upstream: String
  ahead: Int
  behind: Int
  pushed: Boolean
  unpushedReason: String
  error: String
  commits: [CommitRef!]
}

type CommitRef {
  sha: String!
  parents: [String!]!
  refs: [String!]!
  time: String!
  summary: String!
  author: String
}

type DiffHunk {
  oldStart: Int!
  oldLines: Int!
  newStart: Int!
  newLines: Int!
  header: String
  body: String!
}

type DiffFile {
  oldPath: String
  newPath: String
  mode: String
  isBinary: Boolean!
  isNew: Boolean!
  isDeleted: Boolean!
  isRename: Boolean!
  hunks: [DiffHunk!]!
}

type GitOpResult {
  ok: Boolean!
  conflicted: Boolean!
  conflictFiles: [String!]!
  message: String!
  source: WorkspaceSourceStatus
}

type WorkspaceSourceStatus {
  slot: String!
  source: String!
  kind: String!
  mode: String
  branch: String
  ref: String
  subpath: String
  path: String!
  exists: Boolean!
  state: String!
  currentRef: String
  dirty: Boolean!
  upstream: String
  ahead: Int
  behind: Int
  pushed: Boolean!
  unpushedReason: String
  error: String
}

type WorkspaceMountRef {
  kind: String!
  name: String!
  field: String!
  value: String!
}

type GitOpsLink {
  id: String!
  source: String!
  workspace: String!
  slot: String!
  kind: String!
  mode: String
  branch: String
  ref: String
  path: String!
  exists: Boolean!
  state: String!
  currentRef: String
  dirty: Boolean!
  upstream: String
  ahead: Int
  behind: Int
  pushed: Boolean!
  unpushedReason: String
  error: String
}

type GitOpsSummary {
  sources: Int!
  workspaces: Int!
  worktrees: Int!
  clean: Int!
  dirty: Int!
  ahead: Int!
  behind: Int!
  diverged: Int!
  branchMismatch: Int!
  missing: Int!
  error: Int!
  unpushed: Int!
}

type StackStatus {
  root: String!
  name: String!
  services: [ServiceState!]!
  jobs: [JobState!]!
  workspaces: [WorkspaceRef!]!
}

type WorkspaceStatus {
  name: String!
  path: String!
  exists: Boolean!
  state: String!
  error: String
  template: String!
  inputs: JSON
  sources: [WorkspaceSourceStatus!]!
  chain: [String!]!
  chainRoot: String
  allocations: JSON
  processComposePort: Int
  playwrightMcpName: String
  playwrightMcpUrl: String
  persistPaths: JSON
  ttl: String
  ttlExpiresAt: String
  expired: Boolean!
  mountedBy: [WorkspaceMountRef!]!
  innerStack: StackStatus
  innerError: String
}

type GitOpsTopology {
  root: String!
  name: String!
  sources: [SourceState!]!
  workspaces: [WorkspaceStatus!]!
  links: [GitOpsLink!]!
  summary: GitOpsSummary!
}

type ServiceEndpoint {
  routed: Boolean!
  url: String!
  internalHost: String!
  internalPort: Int!
}

type IngressStatus {
  type: String!
  domain: String
  routes: [RouteRef!]!
}

type RouteRef {
  service: String!
  url: String!
}

type CompiledStack {
  compose: JSON
  processCompose: JSON
  secretEnvVars: [KeyValue!]!
}

type MutationResult {
  status: String!
  name: String
  message: String
}

type StackInitResult {
  status: String!
  template: String!
  root: String!
}

# --- per-collection filter / sort / connection types --------------------------

input ServiceStateFilter {
  and: [ServiceStateFilter!]
  or: [ServiceStateFilter!]
  id: StringFieldComparison
  name: StringFieldComparison
  runtime: StringFieldComparison
  status: StringFieldComparison
  health: StringFieldComparison
}

enum ServiceStateSortFields {
  id
  name
  runtime
  status
  health
}

input ServiceStateSort {
  field: ServiceStateSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type ServiceStateConnection {
  nodes: [ServiceState!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

input JobStateFilter {
  and: [JobStateFilter!]
  or: [JobStateFilter!]
  id: StringFieldComparison
  name: StringFieldComparison
  runtime: StringFieldComparison
}

enum JobStateSortFields {
  id
  name
  runtime
}

input JobStateSort {
  field: JobStateSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type JobStateConnection {
  nodes: [JobState!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

input SourceStateFilter {
  and: [SourceStateFilter!]
  or: [SourceStateFilter!]
  id: StringFieldComparison
  name: StringFieldComparison
  kind: StringFieldComparison
  state: StringFieldComparison
  branch: StringFieldComparison
  exists: BooleanFieldComparison
  dirty: BooleanFieldComparison
  pushed: BooleanFieldComparison
}

enum SourceStateSortFields {
  id
  name
  kind
  state
  branch
}

input SourceStateSort {
  field: SourceStateSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type SourceStateConnection {
  nodes: [SourceState!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

input WorkspaceRefFilter {
  and: [WorkspaceRefFilter!]
  or: [WorkspaceRefFilter!]
  id: StringFieldComparison
  name: StringFieldComparison
  template: StringFieldComparison
}

enum WorkspaceRefSortFields {
  id
  name
  template
}

input WorkspaceRefSort {
  field: WorkspaceRefSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type WorkspaceRefConnection {
  nodes: [WorkspaceRef!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

input TemplateDescriptorFilter {
  and: [TemplateDescriptorFilter!]
  or: [TemplateDescriptorFilter!]
  id: StringFieldComparison
  ref: StringFieldComparison
  kind: StringFieldComparison
  name: StringFieldComparison
}

enum TemplateDescriptorSortFields {
  id
  ref
  kind
  name
}

input TemplateDescriptorSort {
  field: TemplateDescriptorSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type TemplateDescriptorConnection {
  nodes: [TemplateDescriptor!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

input SecretRefFilter {
  and: [SecretRefFilter!]
  or: [SecretRefFilter!]
  id: StringFieldComparison
  name: StringFieldComparison
  envVar: StringFieldComparison
  declared: BooleanFieldComparison
  hasValue: BooleanFieldComparison
  required: BooleanFieldComparison
  generated: BooleanFieldComparison
}

enum SecretRefSortFields {
  id
  name
  envVar
  declared
  hasValue
}

input SecretRefSort {
  field: SecretRefSortFields!
  direction: SortDirection!
  nulls: SortNulls
}

type SecretRefConnection {
  nodes: [SecretRef!]!
  totalCount: Int!
  pageInfo: OffsetPageInfo!
}

# --- inputs -------------------------------------------------------------------

input KeyValueInput {
  key: String!
  value: String!
}

input StackInitInput {
  template: String!
  path: String
  inputs: [KeyValueInput!]
  force: Boolean
}

input StackRuntimeInput {
  services: [String!]
  build: Boolean
}

input ServiceInput {
  name: String
  runtime: String
  image: String
  command: [String!]
  mounts: [String!]
  env: [KeyValueInput!]
