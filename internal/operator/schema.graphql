}

type WorkspaceSourceStatus {
  slot: String!
  source: String!
  kind: String!
  mode: String
  branch: String
  ref: String
  subpath: String
  path: String!
  exists: Boolean!
  state: String!
  currentRef: String
  dirty: Boolean!
  upstream: String
  ahead: Int
  behind: Int
  pushed: Boolean!
  unpushedReason: String
  error: String
}

type WorkspaceMountRef {
  kind: String!
  name: String!
  field: String!
  value: String!
}

type GitOpsLink {
  id: String!
  source: String!
  workspace: String!
  slot: String!
  kind: String!
  mode: String
  branch: String
  ref: String
  path: String!
  exists: Boolean!
  state: String!
  currentRef: String
  dirty: Boolean!
  upstream: String
  ahead: Int
  behind: Int
  pushed: Boolean!
  unpushedReason: String
  error: String
}

type GitOpsSummary {
  sources: Int!
  workspaces: Int!
  worktrees: Int!
  clean: Int!
  dirty: Int!
  ahead: Int!
  behind: Int!
  diverged: Int!
  branchMismatch: Int!
  missing: Int!
  error: Int!
  unpushed: Int!
}

type StackStatus {
  root: String!
  name: String!
